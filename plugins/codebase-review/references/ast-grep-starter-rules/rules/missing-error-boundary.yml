id: async-component-no-error-handling
language: typescript
severity: hint
message: "Async operation in React component/hook without error handling. Consider adding try-catch or an error boundary."
note: "Unhandled async errors in React cause silent failures — the component renders stale data with no indication of failure."
rule:
  kind: await_expression
  inside:
    kind: arrow_function
    inside:
      kind: call_expression
      has:
        kind: identifier
        regex: "^use(Effect|Callback|Memo|LayoutEffect)$"
        stopBy: end
      stopBy: end
    stopBy: end
  not:
    inside:
      kind: try_statement
      stopBy: end
