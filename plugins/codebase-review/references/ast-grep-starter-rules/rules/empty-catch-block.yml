id: empty-catch-block
language: typescript
severity: warning
message: "Empty catch block silently swallows errors. At minimum, log the error or add a comment explaining why it's intentionally ignored."
note: "Silent error swallowing is one of the most common sources of hard-to-debug production issues."
rule:
  kind: catch_clause
  has:
    kind: statement_block
    not:
      has:
        kind: expression_statement
    stopBy: end
