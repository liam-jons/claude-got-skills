id: await-in-loop
language: typescript
severity: hint
message: "await inside a loop processes items sequentially. Consider Promise.all() or Promise.allSettled() for parallel execution."
note: "Sequential awaits in loops can be orders of magnitude slower than parallel execution. Only sequential if order-dependent."
rule:
  kind: await_expression
  inside:
    any:
      - kind: for_statement
      - kind: for_in_statement
      - kind: while_statement
      - kind: do_statement
    stopBy: end
